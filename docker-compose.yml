services:
  redis:
    image: redis:7-alpine
    container_name: code-judge-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 6

  backend-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production-api
    container_name: code-judge-backend
    expose:
      - '4100'
    ports:
      - '${HOST_PORT:-4100}:${PORT:-4100}'
    environment:
      DATABASE_URL: ${DATABASE_URL:-file:/app/data/code_judge.db}
      SQLITE_DB_FILE: ${SQLITE_DB_FILE:-/app/data/code_judge.db}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required and must be at least 32 characters}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-86400}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?INTERNAL_API_KEY is required}
      NODE_ENV: production
      PORT: ${PORT:-4100}
      JUDGE_QUEUE_DRIVER: redis
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JUDGE_CONCURRENCY: ${JUDGE_CONCURRENCY:-2}
      JUDGE_JOB_ATTEMPTS: ${JUDGE_JOB_ATTEMPTS:-3}
      JUDGE_STUCK_AFTER_SECONDS: ${JUDGE_STUCK_AFTER_SECONDS:-300}
      # Optional: seed demo data on startup (WARNING: seed wipes existing data)
      SEED_DB: ${SEED_DB:-false}
    volumes:
      - backend_data:/app/data
    command: >
      sh -c "DB_DIR=$${SQLITE_DB_FILE%/*} && mkdir -p \"$$DB_DIR\" && touch \"$$SQLITE_DB_FILE\" && npx prisma migrate deploy --schema prisma/schema.prisma && if [ \"$$SEED_DB\" = \"true\" ]; then node dist/prisma/seed.js; fi && npm run start:prod"
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(''http://127.0.0.1:'' + (process.env.PORT || 4100) + ''/api/v1/health/ready'').then(r => r.ok ? r.json() : Promise.reject(new Error(''bad status''))).then(body => process.exit(body.status === ''UP'' ? 0 : 1)).catch(() => process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  judge-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: production-worker
    container_name: code-judge-worker
    environment:
      DATABASE_URL: ${DATABASE_URL:-file:/app/data/code_judge.db}
      SQLITE_DB_FILE: ${SQLITE_DB_FILE:-/app/data/code_judge.db}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required and must be at least 32 characters}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?INTERNAL_API_KEY is required}
      NODE_ENV: production
      JUDGE_QUEUE_DRIVER: redis
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JUDGE_CONCURRENCY: ${JUDGE_CONCURRENCY:-2}
      JUDGE_JOB_ATTEMPTS: ${JUDGE_JOB_ATTEMPTS:-3}
      JUDGE_STUCK_AFTER_SECONDS: ${JUDGE_STUCK_AFTER_SECONDS:-300}
      TMPDIR: ${JUDGE_TMP_DIR:-/tmp/code-judge-workspaces}
    volumes:
      - backend_data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
      - ${JUDGE_TMP_DIR:-/tmp/code-judge-workspaces}:${JUDGE_TMP_DIR:-/tmp/code-judge-workspaces}
    depends_on:
      backend-api:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: code-judge-caddy
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    environment:
      DOMAIN_NAME: ${DOMAIN_NAME:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend-api:
        condition: service_healthy

volumes:
  backend_data:
  redis_data:
  caddy_data:
  caddy_config:
