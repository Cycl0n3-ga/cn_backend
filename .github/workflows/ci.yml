name: Backend CI

on:
  push:
    branches:
      - '**'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run ESLint
        run: npm run lint:check

      - name: Run Prettier check
        run: npm run format:check

      - name: Check Prisma migrations
        run: npm run check:migrations

  test:
    runs-on: ubuntu-latest
    needs: lint-and-format
    permissions:
      contents: read
      checks: write
      pull-requests: write
      issues: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run Unit Tests
        run: npm run test:cov

      - name: Run Integration Tests
        if: always()
        run: npm run test:integration

      - name: Run E2E Tests
        if: always()
        run: npm run test:e2e

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: |
            test-results/**/*.xml

      - name: Code Coverage Report
        uses: irongut/CodeCoverageSummary@v1.3.0
        if: always()
        with:
          filename: coverage/cobertura-coverage.xml
          badge: true
          fail_below_min: false
          format: markdown
          hide_branch_rate: false
          hide_complexity: true
          indicators: true
          output: both
          thresholds: '50 75'

      - name: Add Coverage PR Comment
        uses: marocchino/sticky-pull-request-comment@v2
        if: github.event_name == 'pull_request' && always()
        with:
          recreate: true
          path: code-coverage-results.md

      - name: Publish Coverage to Job Summary
        if: always()
        run: |
          if [ -f code-coverage-results.md ]; then
            cat code-coverage-results.md >> $GITHUB_STEP_SUMMARY
          fi

  build:
    runs-on: ubuntu-latest
    needs: lint-and-format
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build application
        run: npm run build

      - name: Verify worker entrypoint
        run: test -f dist/src/worker.js

  performance-test:
    runs-on: ubuntu-latest
    needs: [build, test]
    services:
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
    env:
      DATABASE_URL: 'file:${{ github.workspace }}/test-perf.db'
      JWT_SECRET: 'ci-test-secret-must-be-at-least-32-characters'
      JWT_EXPIRES_IN: '3600'
      INTERNAL_API_KEY: 'ci-internal-api-key-must-be-at-least-32-characters'
      PORT: '4100'
      REDIS_URL: 'redis://localhost:6379'
      JUDGE_QUEUE_DRIVER: 'inline'
      PERFORMANCE_TEST: 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Setup database
        run: |
          npx prisma migrate deploy
          npx prisma db seed

      - name: Start application in background
        run: npm run start:prod > server.log 2>&1 &

      - name: Wait for server to be ready
        run: |
          echo "Waiting for server to start..."
          timeout 30s bash -c 'until curl -s http://localhost:4100/api/v1/health/ready > /dev/null; do sleep 1; done' || {
            echo "❌ Server failed to start! Dumping server.log:"
            cat server.log
            exit 1
          }
          echo "Server is ready!"

      - name: Run Performance Test
        run: npm run test:perf

  docker-check:
    runs-on: ubuntu-latest
    needs: [build, test]
    env:
      DATABASE_URL: file:/app/data/code_judge.db
      JWT_SECRET: ci-docker-secret-must-be-at-least-32-characters
      INTERNAL_API_KEY: ci-internal-api-key-must-be-at-least-32-characters
      HOST_PORT: 4100
      PORT: 4100
      REDIS_URL: redis://redis:6379
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Validate docker compose config
        run: docker compose config

      - name: Build API Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          target: production-api
          tags: code-judge-backend-api:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Worker Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          target: production-worker
          tags: code-judge-worker:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Compose health smoke test
        run: |
          docker compose up -d redis backend-api judge-worker
          timeout 90s bash -c 'until curl -fsS http://localhost:4100/api/v1/health/ready >/dev/null; do docker compose ps; sleep 3; done'
          npm ci
          npm run test:smoke
        env:
          SEED_DB: 'true'

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs --tail=150

      - name: Stop compose
        if: always()
        run: docker compose down -v
